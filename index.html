<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YALNIZ DEĞİLSİN</title>

<style>
body{
    margin:0;
    width:100%;
    height:100vh;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial,sans-serif;
}

.yakinda{
    font-size:48px;
    letter-spacing:10px;
}

.enter{
    margin-top:20px;
    font-size:12px;
    cursor:pointer;
    opacity:0.5;
}
</style>
</head>

<body>

<div class="yakinda">YAKINDA</div>
<div class="enter" onclick="playMusic()">ENTER</div>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic(){
    document.getElementById("music").play();
}
</script>

</body>
</html>
